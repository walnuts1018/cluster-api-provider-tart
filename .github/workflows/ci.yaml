name: CI
on:
  push:
  pull_request:
  workflow_dispatch:
permissions:
  contents: read

jobs:
  generate:
    name: generateで差分があったら落とす
    runs-on: ubuntu-slim
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup tools
        uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db # v3.6.3

      - name: generate
        run: |
          mise run generate

      - name: diff があったら落とす
        run: git diff --exit-code

  lint:
    name: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup tools
        uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db # v3.6.3

      - name: Lint
        run: mise lint

  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup tools
        uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db # v3.6.3

      - name: Running Test
        run: |
          go mod tidy
          mise run test

  test-build:
    name: build check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup tools
        uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db # v3.6.3

      - name: build
        run: mise run build

  sync-helm-chart:
    name: sync-helm-chartで差分があったら落とす
    runs-on: ubuntu-slim
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup tools
        uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db # v3.6.3

      - name: sync-all
        run: mise run sync-all

      - name: diff があったら落とす
        run: git diff --exit-code

  test-e2e:
    name: E2E Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup tools
        uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db # v3.6.3

      - name: Running Test e2e
        run: |
          go mod tidy
          mise run test-e2e

  status-check:
    runs-on: ubuntu-slim
    needs: [generate, lint, test, test-build, sync-helm-chart, test-e2e]
    if: failure()
    steps:
      - run: exit 1
