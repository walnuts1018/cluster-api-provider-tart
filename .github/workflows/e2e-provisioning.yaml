name: E2E Provisioning Test

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  e2e-provisioning:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup tools
        uses: jdx/mise-action@6d1e696aa24c1aa1bcc1adea0212707c71ab78a8 # v3.6.1

      - name: Install dependencies (QEMU & KVM & tools)
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-kvm libvirt-daemon-system libvirt-clients bridge-utils ovmf dnsmasq iproute2 tcpdump

      - name: Run E2E Provisioning Test
        run: |
          mise run test-provisioning-e2e

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-provisioning-logs
          path: |
            _artifacts/
            *.log
            *.pcap
            /tmp/dnsmasq.leases
          retention-days: 7
