name: E2E Provisioning Test

on:
  workflow_dispatch:
permissions:
  contents: read

jobs:
  e2e-provisioning:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup tools
        uses: jdx/mise-action@6d1e696aa24c1aa1bcc1adea0212707c71ab78a8 # v3.6.1

      - name: Install dependencies (QEMU & KVM)
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-kvm libvirt-daemon-system libvirt-clients bridge-utils ovmf dnsmasq iproute2

      - name: Download iPXE binaries for TFTP
        run: |
          mkdir -p /var/lib/tftpboot
          sudo curl -L -o /var/lib/tftpboot/ipxe-x86_64.efi "https://github.com/ipxe/ipxe/releases/download/rel-1.21.1/ipxe-x86_64-efi"
          sudo curl -L -o /var/lib/tftpboot/ipxe-arm64.efi "https://github.com/ipxe/ipxe/releases/download/rel-1.21.1/ipxe-arm64-efi"

      - name: Install k3s
        run: |
          curl -fsSL https://get.k3s.io | sh -
          sudo chmod a+r /etc/rancher/k3s/k3s.yaml
          sleep 10

      - name: Create Linux Bridge
        run: |
          sudo ip link add br0 type bridge
          sudo ip addr add 192.168.100.1/24 dev br0
          sudo ip link set br0 up
          sudo sysctl -w net.ipv4.ip_forward=1
          sudo iptables -t nat -A POSTROUTING -o eth0 -j MASQUERADE
          sudo iptables -A FORWARD -i br0 -j ACCEPT
          sudo iptables -A FORWARD -o br0 -m state --state RELATED,ESTABLISHED -j ACCEPT

      - name: Start dnsmasq for DHCP & ProxyDHCP & TFTP
        run: |
          sudo dnsmasq \
            --interface=br0 \
            --bind-interfaces \
            --dhcp-range=192.168.100.10,192.168.100.50,120s \
            --dhcp-option=option:router,192.168.100.1 \
            --dhcp-option=option:dns-server,8.8.8.8 \
            --dhcp-range=192.168.100.10,192.168.100.50,proxy \
            --enable-tftp \
            --tftp-root=/var/lib/tftpboot \
            --dhcp-boot=tag:!ipxe,ipxe-x86_64.efi \
            --dhcp-boot=tag:ipxe,http://192.168.100.1:8082/ipxe \
            --dhcp-leasefile=/tmp/dnsmasq.leases \
            --log-dhcp \
            --keep-in-foreground &
          sleep 2
          sudo cat /tmp/dnsmasq.leases

      - name: Apply TartHost & TartMachine CRDs
        run: |
          cat <<EOF | kubectl apply -f -
          apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
          kind: TartHost
          metadata:
            name: test-host
          spec:
            macAddress: "52:54:00:12:34:56"
            bootMACAddress: "52:54:00:12:34:56"
          ---
          apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
          kind: TartMachine
          metadata:
            name: test-machine
            namespace: default
          spec:
            image: "https://repo.talos.dev/image/talos-v1.9.4-qemu-amd64.xz"
            kernelParams:
              - talos.platform=qemu
              - console=ttyS0
          EOF
          kubectl get tarthost tart-host -o yaml
          kubectl get tartmachine test-machine -o yaml

      - name: Wait for TartMachine to be provisioned
        run: |
          echo "Waiting for TartMachine to be provisioned..."
          timeout 180 bash -c '
            while true; do
              status=$(kubectl get tartmachine test-machine -o jsonpath="{.status.ready}" 2>/dev/null || echo "")
              echo "TartMachine ready status: $status"
              if [ "$status" = "true" ]; then
                echo "TartMachine is ready!"
                exit 0
              fi
              sleep 5
            done
          ' || {
            echo "TartMachine did not become ready in time"
            kubectl describe tartmachine test-machine
            exit 1
          }

      - name: Build Controller Binary
        run: |
          mise run build

      - name: Configure k3s kubeconfig
        run: |
          sudo cp /etc/rancher/k3s/k3s.yaml ~/.kube/config
          sudo sed -i 's/https:\/\/127.0.0.1:6443/https:\/\/127.0.0.1:6443/g' ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Run Controller
        run: |
          sudo KUBECONFIG=/etc/rancher/k3s/k3s.yaml \
            bin/manager \
            --leader-elect=false \
            --ipxe-bind-address=:8082 \
            --bootstrap-bind-address=0 \
            --tftp-bind-address=0 \
            --assets-root=/var/lib/tart/assets \
            --tftp-root=/var/lib/tftpboot &
          sleep 5

      - name: Start QEMU VM (PXE Boot)
        run: |
          sudo qemu-system-x86_64 \
            -enable-kvm \
            -m 2048 \
            -smp 2 \
            -boot n \
            -netdev bridge,br=br0,id=net0 \
            -device virtio-net-pci,netdev=net0,mac=52:54:00:12:34:56 \
            -bios /usr/share/ovmf/OVMF.fd \
            -nographic \
            -serial file:qemu-output.log \
            -display none &
          QEMU_PID=$!
          echo "QEMU started with PID: $QEMU_PID"
          echo "QEMU_PID=$QEMU_PID" >> $GITHUB_ENV

      - name: Wait for QEMU to complete
        run: |
          sleep 60
          if kill -0 ${{ env.QEMU_PID }} 2>/dev/null; then
            echo "QEMU is still running after 60 seconds"
            kill ${{ env.QEMU_PID }} 2>/dev/null || true
          fi

      - name: Print QEMU Logs
        if: always()
        run: |
          echo "=== QEMU Output Log ==="
          cat qemu-output.log 2>/dev/null || echo "No qemu-output.log found"

      - name: Print Manager Logs
        if: always()
        run: |
          echo "=== Manager Process Status ==="
          pgrep -af "manager" || echo "Manager process not found"
          echo "=== Network Configuration ==="
          ip addr show br0 2>/dev/null || echo "br0 not found"
          echo "=== dnsmasq Status ==="
          pgrep -af "dnsmasq" || echo "dnsmasq process not found"

      - name: Print Kubernetes Resources
        if: always()
        run: |
          echo "=== TartHost ==="
          kubectl get tarthost -o wide
          echo "=== TartMachine ==="
          kubectl get tartmachine -o wide
          echo "=== Events ==="
          kubectl get events --sort-by=.lastTimestamp -A | tail -50

      - name: Upload QEMU logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-provisioning-logs
          path: |
            qemu-output.log
            /tmp/dnsmasq.leases
          retention-days: 7
