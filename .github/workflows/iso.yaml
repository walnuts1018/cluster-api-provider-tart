name: Release
on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Image tag for manual publishing.
        required: true
        default: dev

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/iso

jobs:
  download-iso:
    name: Download ISO
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - key: ubuntu-26.04-amd64
            iso: http://ftp.riken.go.jp/Linux/ubuntu-releases/26.04/ubuntu-26.04-live-server-amd64.iso
            files:
              - casper/vmlinuz
              - casper/initrd
          - key: ubuntu-26.04-arm64
            iso: http://ftp.riken.go.jp/Linux/ubuntu-releases/26.04/ubuntu-26.04-live-server-arm64.iso
            files:
              - casper/vmlinuz
              - casper/initrd
          - key: ubuntu-24.04-amd64
            iso: http://ftp.riken.go.jp/Linux/ubuntu-releases/24.04/ubuntu-24.04-live-server-amd64.iso
            files:
              - casper/vmlinuz
              - casper/initrd
          - key: ubuntu-24.04-arm64
            iso: http://ftp.riken.go.jp/Linux/ubuntu-releases/24.04/ubuntu-24.04-live-server-arm64.iso
            files:
              - casper/vmlinuz
              - casper/initrd
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Download ISO files
        run: |
          mkdir -p dist/iso
          curl -L -o dist/iso/image.iso ${{ matrix.iso }}

      - name: Get initrd and vmlinuz from ISO
        run: |
          mkdir -p /tmp/mnt
          sudo mount -o loop dist/iso/image.iso /tmp/mnt
          for file in ${{ matrix.files }}; do
            sudo cp /tmp/mnt/$file dist/iso/${file//\//-}
          done
          sudo umount /tmp/mnt

      - name: Resolve image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            image_tag=${{ github.event.inputs.image_tag }}"
          else
            image_tag=v0.0.${{ github.run_number }}"
          fi
          echo "ImageTag=${image_tag}" >> "$GITHUB_OUTPUT"

      - name: Build and Push OCI Artifact using ORAS
        run: |
          go run hack/artifacter/main.go \
            -dir dist/iso \
            -repo ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.key }} \
            -tag ${{ steps.tag.outputs.ImageTag }}
