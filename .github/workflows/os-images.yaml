name: Build OS Images
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      image_tag:
        description: Image tag for manual publishing.
        required: true
        default: dev
      kubernetes_version:
        description: Kubernetes version installed into kubeadm images.
        required: true
        default: v1.35.4
      k3s_version:
        description: k3s version installed into k3s images. Empty uses the installer default.
        required: false
        default: ""
      image_builder_ref:
        description: kubernetes-sigs/image-builder git ref.
        required: true
        default: main

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-os-image

jobs:
  build:
    name: Build and publish ${{ matrix.key }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - key: kubeadm-ubuntu-24.04-amd64
            kind: kubeadm
            output: kubeadm-ubuntu-24.04-amd64.raw
            image_builder_target: build-raw-ubuntu-2404
          - key: kubeadm-debian-13-amd64
            kind: kubeadm
            output: kubeadm-debian-13-amd64.raw
            image_builder_target: build-raw-debian-13
          - key: kubeadm-ubuntu-26.04-amd64
            kind: kubeadm
            output: kubeadm-ubuntu-26.04-amd64.raw
            image_builder_target: build-raw-ubuntu-2604
          - key: k3s-ubuntu-24.04-amd64
            kind: k3s
            output: k3s-ubuntu-24.04-amd64.raw
            cloud_image_url: https://cloud-images.ubuntu.com/noble/current/noble-server-cloudimg-amd64.img
          - key: k3s-debian-13-amd64
            kind: k3s
            output: k3s-debian-13-amd64.raw
            cloud_image_url: https://cloud.debian.org/images/cloud/trixie/latest/debian-13-genericcloud-amd64.qcow2
          - key: k3s-ubuntu-26.04-amd64
            kind: k3s
            output: k3s-ubuntu-26.04-amd64.raw
            cloud_image_url: https://cloud-images.ubuntu.com/resolute/current/resolute-server-cloudimg-amd64.img
    steps:
      - name: Check out
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Install image build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-kvm qemu-utils libguestfs-tools curl tar
          sudo chmod 0666 /dev/kvm || true

      - name: Build kubeadm raw image
        if: matrix.kind == 'kubeadm'
        run: |
          hack/osimage/build-kubeadm-raw.sh
        env:
          IMAGE_KEY: ${{ matrix.key }}
          IMAGE_BUILDER_TARGET: ${{ matrix.image_builder_target }}
          IMAGE_BUILDER_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.image_builder_ref || 'main' }}
          KUBERNETES_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.kubernetes_version || 'v1.35.4' }}
          OUTPUT_IMAGE_NAME: ${{ matrix.output }}

      - name: Build k3s raw image
        if: matrix.kind == 'k3s'
        run: |
          hack/osimage/build-k3s-raw.sh
        env:
          IMAGE_KEY: ${{ matrix.key }}
          CLOUD_IMAGE_URL: ${{ matrix.cloud_image_url }}
          K3S_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.k3s_version || '' }}
          OUTPUT_IMAGE_NAME: ${{ matrix.output }}

      - name: Resolve image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            image_tag="${{ github.ref_name }}"
          else
            image_tag="${{ inputs.image_tag }}"
          fi
          echo "ImageTag=${image_tag}" >> "$GITHUB_OUTPUT"

      - name: Push OCI Artifact using ORAS
        run: |
          go run hack/artifacter/main.go \
            -dir "dist/os-images/${{ matrix.key }}" \
            -repo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.key }}" \
            -tag "${{ steps.tag.outputs.ImageTag }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
