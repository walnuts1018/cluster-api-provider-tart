                  metadata:
                    description: metadata is applied to the generated TartMachine.
                    type: object
                  spec:
                    description: spec defines the desired state of the generated TartMachine.
                    properties:
                      failureDomain:
                        description: |-
                          failureDomain specifies the failure domain for the machine.
                          Must comply with the failure domain specified in the core Machine object.
                        type: string
                      image:
                        description: image is the boot OS image URL or a path served
                          by the assets server.
                        minLength: 1
                        type: string
                      initrd:
                        description: initrd is the boot initrd image URL or a path
                          served by the assets server.
                        minLength: 1
                        type: string
                      kernelParams:
                        description: kernelParams are passed from iPXE to the OS kernel.
                        items:
                          maxLength: 2048
                          minLength: 1
                          type: string
                        maxItems: 100
                        type: array
                      providerID:
                        description: providerID is the infrastructure provider ID
                          reported back to the CAPI Machine.
                        type: string
                    required:
                    - image
                    type: object
                required:
                - spec
                type: object
            required:
            - template
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
