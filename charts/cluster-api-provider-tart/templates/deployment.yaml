apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cluster-api-provider-tart.fullname" . }}-controller-manager
  labels:
    cluster.x-k8s.io/provider: infrastructure-tart
    control-plane: controller-manager
  {{- include "cluster-api-provider-tart.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.controllerManager.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: cluster-api-provider-tart
      cluster.x-k8s.io/provider: infrastructure-tart
      control-plane: controller-manager
    {{- include "cluster-api-provider-tart.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cluster-api-provider-tart
        cluster.x-k8s.io/provider: infrastructure-tart
        control-plane: controller-manager
      {{- include "cluster-api-provider-tart.selectorLabels" . | nindent 8 }}
      {{- with .Values.controllerManager.podLabels }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      annotations:
        kubectl.kubernetes.io/default-container: {{ .Values.controllerManager.managerName }}
      {{- with .Values.controllerManager.podAnnotations }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.controllerManager.priorityClassName }}
      priorityClassName: {{ . | quote }}
      {{- end }}
      {{- with .Values.controllerManager.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
      - name: {{ .Values.controllerManager.managerName }}
        args: {{- toYaml .Values.controllerManager.manager.args | nindent 8 }}
        command:
        - /manager
        env:
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: KUBERNETES_CLUSTER_DOMAIN
          value: {{ quote .Values.kubernetesClusterDomain }}
        {{- with .Values.controllerManager.env }}
          {{- toYaml . | nindent 8 }}
        {{- end }}
        image: {{ .Values.controllerManager.manager.image.repository }}:{{ .Values.controllerManager.manager.image.tag | default .Chart.AppVersion }}
        imagePullPolicy: {{ .Values.controllerManager.manager.image.pullPolicy }}
        {{- with .Values.controllerManager.manager.livenessProbe }}
        livenessProbe:
          {{- toYaml . | nindent 8 }}
        {{- end }}
        ports:
        {{- .Values.controllerManager.network.containerPorts | toYaml | nindent 8 }}
        {{- with .Values.controllerManager.manager.readinessProbe }}
        readinessProbe:
          {{- toYaml . | nindent 8 }}
        {{- end }}
        resources: {{- toYaml .Values.controllerManager.manager.resources | nindent 8 }}
        securityContext: {{- toYaml .Values.controllerManager.manager.containerSecurityContext
          | nindent 8 }}
        volumeMounts:
        {{- toYaml .Values.controllerManager.volumeMounts | nindent 8 }}
      {{- with .Values.controllerManager.network.dnsConfig }}
      dnsConfig:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      dnsPolicy: {{ .Values.controllerManager.network.dnsPolicy }}
      {{- if .Values.controllerManager.network.hostNetwork }}
      hostNetwork: true
      {{- end }}
      {{- with .Values.controllerManager.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext: {{- toYaml .Values.controllerManager.podSecurityContext | nindent 6
        }}
      serviceAccountName: {{ include "cluster-api-provider-tart.serviceAccountName" . }}
      terminationGracePeriodSeconds: {{ .Values.controllerManager.terminationGracePeriodSeconds
        }}
      {{- with .Values.controllerManager.tolerations }}
      tolerations:
        {{- toYaml . | nindent 6 }}
      {{- end }}
      volumes:
      - name: bootloader
        image:
          reference: {{ .Values.controllerManager.volumes.bootloader.image.repository }}:{{ .Values.controllerManager.volumes.bootloader.image.tag | default .Chart.AppVersion }}
          pullPolicy: {{ .Values.controllerManager.volumes.bootloader.image.pullPolicy }}
