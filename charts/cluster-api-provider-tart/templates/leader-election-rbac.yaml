apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "cluster-api-provider-tart.fullname" . }}-leader-election-role
  labels:
    cluster.x-k8s.io/provider: infrastructure-tart
  {{- include "cluster-api-provider-tart.labels" . | nindent 4 }}
rules:
- apiGroups:
  - ""
  resources:
  - configmaps
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
- apiGroups:
  - coordination.k8s.io
  resources:
  - leases
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "cluster-api-provider-tart.fullname" . }}-leader-election-rolebinding
  labels:
    cluster.x-k8s.io/provider: infrastructure-tart
  {{- include "cluster-api-provider-tart.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: '{{ include "cluster-api-provider-tart.fullname" . }}-leader-election-role'
subjects:
- kind: ServiceAccount
  name: '{{ include "cluster-api-provider-tart.serviceAccountName" . }}'
  namespace: '{{ .Release.Namespace }}'
