apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "cluster-api-provider-tart.fullname" . }}-metrics-reader
  labels:
    cluster.x-k8s.io/provider: infrastructure-tart
  {{- include "cluster-api-provider-tart.labels" . | nindent 4 }}
rules:
- nonResourceURLs:
  - /metrics
  verbs:
  - get
