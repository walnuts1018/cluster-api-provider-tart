apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: manager-rolebinding
  labels:
    app.kubernetes.io/name: cluster-api-provider-tart
    app.kubernetes.io/managed-by: {{ .Release.Service }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Values.clusterRole.name | default "manager-role" }}
subjects:
- kind: ServiceAccount
  name: {{ .Values.serviceAccount.name | default "controller-manager" }}
  namespace: {{ .Values.namespace | default .Release.Namespace }}
