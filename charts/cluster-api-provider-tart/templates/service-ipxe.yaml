apiVersion: v1
kind: Service
metadata:
  name: controller-manager-ipxe
  namespace: {{ .Values.namespace | default .Release.Namespace }}
  labels:
    app.kubernetes.io/name: cluster-api-provider-tart
spec:
  ports:
  - name: ipxe
    port: 8082
    protocol: TCP
    targetPort: ipxe
  selector:
    control-plane: controller-manager
    app.kubernetes.io/name: cluster-api-provider-tart
