apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "cluster-api-provider-tart.fullname" . }}-tartmachine-editor-role
  labels:
    cluster.x-k8s.io/provider: infrastructure-tart
  {{- include "cluster-api-provider-tart.labels" . | nindent 4 }}
rules:
- apiGroups:
  - infrastructure.cluster.x-k8s.io
  resources:
  - tartmachines
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - infrastructure.cluster.x-k8s.io
  resources:
  - tartmachines/status
  verbs:
  - get
