apiVersion: v1
kind: ConfigMap
metadata:
  name: bootstrap-dnsmasq
  labels:
    app.kubernetes.io/name: cluster-api-provider-tart
    app.kubernetes.io/component: bootstrap-dnsmasq
    app.kubernetes.io/managed-by: kustomize
data:
  dnsmasq.conf: |
    port=0
    log-dhcp
    log-queries
    dhcp-range=192.0.2.0,proxy
    dhcp-no-override
    pxe-service=X86PC,"Tart iPXE",ipxe.efi
    enable-tftp
    tftp-root=/var/lib/tftpboot
    dhcp-match=set:ipxe,175
    dhcp-boot=tag:!ipxe,ipxe.efi
    # NOTE: The following URL must be reachable by the physical PC.
    # Since physical PCs usually cannot resolve K8s internal DNS, use the IP address of the manager node or a LoadBalancer IP.
    dhcp-boot=tag:ipxe,http://<MANAGER_IP>:8082/ipxe
