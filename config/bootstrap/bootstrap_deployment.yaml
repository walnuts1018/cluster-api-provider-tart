apiVersion: apps/v1
kind: Deployment
metadata:
  name: bootstrap-dnsmasq
  labels:
    app.kubernetes.io/name: cluster-api-provider-tart
    app.kubernetes.io/component: bootstrap-dnsmasq
    app.kubernetes.io/managed-by: kustomize
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cluster-api-provider-tart
      app.kubernetes.io/component: bootstrap-dnsmasq
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cluster-api-provider-tart
        app.kubernetes.io/component: bootstrap-dnsmasq
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
      - name: dnsmasq
        image: quay.io/poseidon/dnsmasq:v1.0.1
        args:
        - --keep-in-foreground
        - --log-facility=-
        - --conf-file=/etc/dnsmasq/dnsmasq.conf
        ports:
        - containerPort: 67
          hostPort: 67
          name: dhcp
          protocol: UDP
        - containerPort: 69
          hostPort: 69
          name: tftp
          protocol: UDP
        - containerPort: 4011
          hostPort: 4011
          name: proxydhcp
          protocol: UDP
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            add:
            - NET_ADMIN
            - NET_BIND_SERVICE
        volumeMounts:
        - name: config
          mountPath: /etc/dnsmasq
          readOnly: true
        - name: tftp-root
          mountPath: /var/lib/tftpboot
      volumes:
      - name: config
        configMap:
          name: bootstrap-dnsmasq
      - name: tftp-root
        emptyDir: {}
