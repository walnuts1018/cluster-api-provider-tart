apiVersion: apps/v1
kind: Deployment
metadata:
  name: bootstrap-dnsmasq
  labels:
    app.kubernetes.io/name: cluster-api-provider-tart
    app.kubernetes.io/component: bootstrap-dnsmasq
    app.kubernetes.io/managed-by: kustomize
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cluster-api-provider-tart
      app.kubernetes.io/component: bootstrap-dnsmasq
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cluster-api-provider-tart
        app.kubernetes.io/component: bootstrap-dnsmasq
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      initContainers:
      - name: init-tftp
        image: alpine:latest
        command: ["/bin/sh", "-c"]
        args:
        - |
          set -e
          apk add --no-network --allow-untrusted /tmp/null 2>/dev/null || apk add --no-cache wget
          wget -O /var/lib/tftpboot/ipxe.efi https://boot.ipxe.org/ipxe.efi
          # Add other bootloaders if needed, e.g., undionly.kpxe for BIOS
          # wget -O /var/lib/tftpboot/undionly.kpxe https://boot.ipxe.org/undionly.kpxe
        volumeMounts:
        - name: tftp-root
          mountPath: /var/lib/tftpboot
      containers:
      - name: dnsmasq
        image: quay.io/poseidon/dnsmasq:v1.0.1
        args:
        - --keep-in-foreground
        - --log-facility=-
        - --conf-file=/etc/dnsmasq/dnsmasq.conf
        ports:
        - containerPort: 67
          hostPort: 67
          name: dhcp
          protocol: UDP
        - containerPort: 69
          hostPort: 69
          name: tftp
          protocol: UDP
        - containerPort: 4011
          hostPort: 4011
          name: proxydhcp
          protocol: UDP
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            add:
            - NET_ADMIN
            - NET_BIND_SERVICE
        volumeMounts:
        - name: config
          mountPath: /etc/dnsmasq
          readOnly: true
        - name: tftp-root
          mountPath: /var/lib/tftpboot
      volumes:
      - name: config
        configMap:
          name: bootstrap-dnsmasq
      - name: tftp-root
        emptyDir: {}
