apiVersion: v1
kind: Service
metadata:
  name: bootstrap-dnsmasq
  labels:
    app.kubernetes.io/name: cluster-api-provider-tart
    app.kubernetes.io/component: bootstrap-dnsmasq
    app.kubernetes.io/managed-by: kustomize
spec:
  selector:
    app.kubernetes.io/name: cluster-api-provider-tart
    app.kubernetes.io/component: bootstrap-dnsmasq
  ports:
  - name: dhcp
    port: 67
    protocol: UDP
    targetPort: dhcp
  - name: tftp
    port: 69
    protocol: UDP
    targetPort: tftp
  - name: proxydhcp
    port: 4011
    protocol: UDP
    targetPort: proxydhcp
