apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../default

patches:
- target:
    kind: Deployment
    name: controller-manager
    namespace: system
  patch: |-
    - op: add
      path: /spec/template/spec/hostNetwork
      value: true
    - op: add
      path: /spec/template/spec/dnsPolicy
      value: ClusterFirstWithHostNet
