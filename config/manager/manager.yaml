apiVersion: v1
kind: Namespace
metadata:
  labels:
    control-plane: controller-manager
    app.kubernetes.io/name: cluster-api-provider-tart
    app.kubernetes.io/managed-by: kustomize
    cluster.x-k8s.io/provider: infrastructure-tart
  # "system" は Kustomize の namePrefix (cluster-api-provider-tart-) により
  # "cluster-api-provider-tart-system" に変換されるプレースホルダーです。
  name: system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: controller-manager
  namespace: system
  labels:
    control-plane: controller-manager
    app.kubernetes.io/name: cluster-api-provider-tart
    app.kubernetes.io/managed-by: kustomize
    cluster.x-k8s.io/provider: infrastructure-tart
spec:
  selector:
    matchLabels:
      control-plane: controller-manager
      app.kubernetes.io/name: cluster-api-provider-tart
  replicas: 1
  strategy:
    type: Recreate # hostNetwork: trueなので、同じPortを複数のPodが使用することを防ぐためにRecreateを指定
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
      labels:
        control-plane: controller-manager
        app.kubernetes.io/name: cluster-api-provider-tart
        cluster.x-k8s.io/provider: infrastructure-tart
    spec:
      hostNetwork: true
      dnsPolicy: Default
      # TODO(user): Uncomment the following code to configure the nodeAffinity expression
      # according to the platforms which are supported by your solution.
      # It is considered best practice to support multiple architectures. You can
      # build your manager image using the makefile target docker-buildx.
      # affinity:
      #   nodeAffinity:
      #     requiredDuringSchedulingIgnoredDuringExecution:
      #       nodeSelectorTerms:
      #         - matchExpressions:
      #           - key: kubernetes.io/arch
      #             operator: In
      #             values:
      #               - amd64
      #               - arm64
      #               - ppc64le
      #               - s390x
      #           - key: kubernetes.io/os
      #             operator: In
      #             values:
      #               - linux
      securityContext:
        # Projects are configured by default to adhere to the "restricted" Pod Security Standards.
        # This ensures that deployments meet the highest security requirements for Kubernetes.
        # For more details, see: https://kubernetes.io/docs/concepts/security/pod-security-standards/#restricted
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - command:
        - /manager
        args:
          - --leader-elect
          - --health-probe-bind-address=:8081
          - --bootstrap-advertise-address=$(POD_IP)
        image: controller:latest
        name: manager
        env:
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        ports:
        - containerPort: 67
          name: bootp
          protocol: UDP
        - containerPort: 69
          name: tftp
          protocol: UDP
        - containerPort: 8082
          name: ipxe
          protocol: TCP
        - containerPort: 9443
          name: ext-webhook
          protocol: TCP
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
            add:
            - NET_BIND_SERVICE
            drop:
            - "ALL"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        # TODO(user): Configure the resources accordingly based on the project requirements.
        # More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
        resources:
          limits:
            cpu: 500m
            memory: 128Mi
          requests:
            cpu: 10m
            memory: 64Mi
        volumeMounts:
        - name: bootloader
          mountPath: /var/lib/tftpboot
          readOnly: true
        - name: agent-assets
          mountPath: /var/lib/tart/assets/agent
          readOnly: true
        - name: os-images
          mountPath: /var/lib/tart/assets/images
          readOnly: true
      volumes:
      - name: bootloader
        image:
          reference: ghcr.io/walnuts1018/cluster-api-provider-tart-ipxe:latest
          pullPolicy: IfNotPresent
      - name: agent-assets
        image:
          reference: ghcr.io/walnuts1018/cluster-api-provider-tart-agent:latest
          pullPolicy: IfNotPresent
      - name: os-images
        image:
          reference: ghcr.io/walnuts1018/cluster-api-provider-tart-os-images:latest
          pullPolicy: IfNotPresent
      serviceAccountName: controller-manager
      terminationGracePeriodSeconds: 10
