apiVersion: cluster.x-k8s.io/v1beta2
kind: Cluster
metadata:
  name: tart-k3s-ubuntu
spec:
  infrastructureRef:
    apiGroup: infrastructure.cluster.x-k8s.io
    kind: TartCluster
    name: tart-k3s-ubuntu
---
apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
kind: TartCluster
metadata:
  name: tart-k3s-ubuntu
spec: {}
---
apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
kind: TartMachineTemplate
metadata:
  name: tart-k3s-ubuntu-control-plane
spec:
  template:
    spec:
      image: http://cloud-images.ubuntu.com/releases/24.04/release/unpacked/ubuntu-24.04-server-cloudimg-amd64-vmlinuz-generic
      initrd: http://cloud-images.ubuntu.com/releases/24.04/release/unpacked/ubuntu-24.04-server-cloudimg-amd64-initrd-generic
      bootstrap:
        format: NoCloud
      kernelParams:
      - console=ttyS0
      - ip=dhcp
      - autoinstall
---
apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
kind: TartMachineTemplate
metadata:
  name: tart-k3s-ubuntu-md-0
spec:
  template:
    spec:
      image: http://cloud-images.ubuntu.com/releases/24.04/release/unpacked/ubuntu-24.04-server-cloudimg-amd64-vmlinuz-generic
      initrd: http://cloud-images.ubuntu.com/releases/24.04/release/unpacked/ubuntu-24.04-server-cloudimg-amd64-initrd-generic
      bootstrap:
        format: NoCloud
      kernelParams:
      - console=ttyS0
      - ip=dhcp
      - autoinstall
