[tools]
"go:sigs.k8s.io/controller-tools/cmd/controller-gen" = "latest"
"go:github.com/google/wire/cmd/wire" = "latest"
"go:sigs.k8s.io/controller-runtime/tools/setup-envtest" = "latest"
"go:sigs.k8s.io/kustomize/kustomize/v5" = "latest"
kind = "latest"
kubebuilder = "latest"
kubectl = "latest"
tilt = "latest"
golangci-lint = "latest"
go = "latest"
k9s = "latest"

[env]
GOCACHE = "{{config_root}}/.cache/go-build"
GOLANGCI_LINT_CACHE = "{{config_root}}/.cache/golangci-lint"

[tasks.all]
description = "デフォルトのビルド処理を実行する"
run = "mise run build"

[tasks.help]
description = "利用可能な mise task を表示する"
run = "mise tasks"

[tasks.manifests]
description = "CRD と RBAC マニフェストを生成する"
run = 'controller-gen rbac:roleName=manager-role crd webhook paths="./..." output:crd:artifacts:config=config/crd/bases'

[tasks.generate]
description = "DeepCopy コードを生成する"
run = '''
controller-gen object:headerFile="hack/boilerplate.go.txt" paths="./..."
mise run wire
'''

[tasks.wire]
description = "wire injector を生成する"
run = "(cd cmd && wire)"

[tasks.fmt]
description = "Go コードを go fmt で整形する"
run = "go fmt ./..."

[tasks.vet]
description = "Go コードを go vet で検証する"
run = "go vet ./..."

[tasks.test]
description = "Go テストを実行する"
run = '''
mise run manifests
mise run generate
mise run fmt
mise run vet
LOCALBIN="${LOCALBIN:-$PWD/bin}"
ENVTEST_K8S_VERSION="${ENVTEST_K8S_VERSION:-$(go list -m k8s.io/api | awk '{print $2}' | sed -E 's/^v?[0-9]+\.([0-9]+).*/1.\1/')}"
KUBEBUILDER_ASSETS="$(setup-envtest use "$ENVTEST_K8S_VERSION" --bin-dir "$LOCALBIN" -p path)" \
  go test $(go list ./... | grep -v /e2e) -coverprofile cover.out
'''

[tasks.setup-test-e2e]
description = "e2e テスト用の Kind クラスタを作成する"
run = '''
KIND_CLUSTER="${KIND_CLUSTER:-cluster-api-provider-tart-test-e2e}"
if kind get clusters | grep -qx "$KIND_CLUSTER"; then
  echo "Kind cluster '$KIND_CLUSTER' already exists. Skipping creation."
else
  echo "Creating Kind cluster '$KIND_CLUSTER'..."
  kind create cluster --name "$KIND_CLUSTER"
fi
'''

[tasks.test-e2e]
description = "Kind を使って e2e テストを実行する"
run = '''
mise run setup-test-e2e
mise run manifests
mise run generate
mise run fmt
mise run vet
KIND_CLUSTER="${KIND_CLUSTER:-cluster-api-provider-tart-test-e2e}"
KIND=kind KIND_CLUSTER="$KIND_CLUSTER" go test -tags=e2e ./test/e2e/ -v -ginkgo.v
mise run cleanup-test-e2e
'''

[tasks.cleanup-test-e2e]
description = "e2e テスト用の Kind クラスタを削除する"
run = '''
KIND_CLUSTER="${KIND_CLUSTER:-cluster-api-provider-tart-test-e2e}"
kind delete cluster --name "$KIND_CLUSTER"
'''

[tasks.ensure-custom-golangci-lint]
description = "カスタム golangci-lint バイナリを用意する"
run = '''
mkdir -p bin
if [ -f .custom-gcl.yml ] && [ ! -x bin/golangci-lint ]; then
  echo "Building custom golangci-lint with plugins..."
  golangci-lint custom --destination bin --name golangci-lint-custom
  mv -f bin/golangci-lint-custom bin/golangci-lint
fi
'''

[tasks.lint]
description = "golangci-lint を実行する"
run = '''
mise run ensure-custom-golangci-lint
if [ -x bin/golangci-lint ]; then
  bin/golangci-lint run
else
  golangci-lint run
fi
'''

[tasks.lint-fix]
description = "golangci-lint の自動修正を実行する"
run = '''
mise run ensure-custom-golangci-lint
if [ -x bin/golangci-lint ]; then
  bin/golangci-lint run --fix
else
  golangci-lint run --fix
fi
'''

[tasks.lint-config]
description = "golangci-lint 設定を検証する"
run = '''
mise run ensure-custom-golangci-lint
if [ -x bin/golangci-lint ]; then
  bin/golangci-lint config verify
else
  golangci-lint config verify
fi
'''

[tasks.build]
description = "manager バイナリをビルドする"
run = '''
mise run manifests
mise run generate
mise run fmt
mise run vet
mkdir -p bin
go build -o bin/manager cmd/main.go
'''

[tasks.run]
description = "ローカルホストで controller を実行する"
run = '''
mise run manifests
mise run generate
mise run fmt
mise run vet
go run ./cmd/main.go
'''

[tasks.docker-build]
description = "manager のコンテナイメージをビルドする"
run = '''
IMG="${IMG:-controller:latest}"
CONTAINER_TOOL="${CONTAINER_TOOL:-docker}"
"$CONTAINER_TOOL" build -t "$IMG" .
'''

[tasks.docker-push]
description = "manager のコンテナイメージを push する"
run = '''
IMG="${IMG:-controller:latest}"
CONTAINER_TOOL="${CONTAINER_TOOL:-docker}"
"$CONTAINER_TOOL" push "$IMG"
'''

[tasks.docker-buildx]
description = "manager のマルチアーキテクチャイメージを buildx でビルドして push する"
run = '''
IMG="${IMG:-controller:latest}"
PLATFORMS="${PLATFORMS:-linux/arm64,linux/amd64,linux/s390x,linux/ppc64le}"
CONTAINER_TOOL="${CONTAINER_TOOL:-docker}"
sed -e '1 s/\(^FROM\)/FROM --platform=\${BUILDPLATFORM}/; t' -e ' 1,// s//FROM --platform=\${BUILDPLATFORM}/' Dockerfile > Dockerfile.cross
"$CONTAINER_TOOL" buildx create --name cluster-api-provider-tart-builder || true
"$CONTAINER_TOOL" buildx use cluster-api-provider-tart-builder
"$CONTAINER_TOOL" buildx build --push --platform="$PLATFORMS" --tag "$IMG" -f Dockerfile.cross . || true
"$CONTAINER_TOOL" buildx rm cluster-api-provider-tart-builder || true
rm Dockerfile.cross
'''

[tasks.docker-build-ipxe]
description = "iPXE binaries をビルドし local に取り出す"
run = '''
mkdir -p dist/ipxe
CONTAINER_TOOL="${CONTAINER_TOOL:-docker}"
"$CONTAINER_TOOL" buildx build --platform linux/amd64,linux/arm64 -f hack/ipxe-artifact/Dockerfile --output type=local,dest=dist/ipxe .
'''

[tasks.docker-push-ipxe]
description = "iPXE artifact を ORAS を使って push する"
run = '''
IPXE_IMG="${IPXE_IMG:-ghcr.io/walnuts1018/cluster-api-provider-tart-ipxe}"
IPXE_TAG="${IPXE_TAG:-latest}"
go run hack/ipxe-artifact/main.go -dir dist/ipxe -repo "$IPXE_IMG" -tag "$IPXE_TAG"
'''


[tasks.build-installer]
description = "CRD と deployment を含む install.yaml を生成する"
run = '''
IMG="${IMG:-controller:latest}"
mise run manifests
mise run generate
manager_kustomization="$(mktemp)"
cp config/manager/kustomization.yaml "$manager_kustomization"
trap 'cp "$manager_kustomization" config/manager/kustomization.yaml; rm -f "$manager_kustomization"' EXIT
mkdir -p dist
(cd config/manager && kustomize edit set image controller="$IMG")
kustomize build config/default > dist/install.yaml
'''

[tasks.build-installer-external-bootstrap]
description = "外部 DHCP/TFTP 前提の install-external-bootstrap.yaml を生成する"
run = '''
IMG="${IMG:-controller:latest}"
mise run manifests
mise run generate
manager_kustomization="$(mktemp)"
cp config/manager/kustomization.yaml "$manager_kustomization"
trap 'cp "$manager_kustomization" config/manager/kustomization.yaml; rm -f "$manager_kustomization"' EXIT
mkdir -p dist
(cd config/manager && kustomize edit set image controller="$IMG")
kustomize build config/external-bootstrap > dist/install-external-bootstrap.yaml
'''

[tasks.build-installer-e2e]
description = "E2E用に HostNetwork を有効化した install-e2e.yaml を生成する"
run = '''
IMG="${IMG:-controller:latest}"
mise run manifests
mise run generate
manager_kustomization="$(mktemp)"
cp config/manager/kustomization.yaml "$manager_kustomization"
trap 'cp "$manager_kustomization" config/manager/kustomization.yaml; rm -f "$manager_kustomization"' EXIT
mkdir -p dist
(cd config/manager && kustomize edit set image controller="$IMG")
kustomize build config/e2e > dist/install-e2e.yaml
'''

[tasks.setup-test-provisioning-k3s]
description = "E2E Provisioning テスト用の k3s マネジメントクラスタとネットワークをセットアップする"
run = '''
set -e
# 1. Install k3s if not present
if ! command -v k3s &> /dev/null; then
  echo "Installing k3s..."
  curl -fsSL https://get.k3s.io | sh -
  sleep 10
else
  echo "k3s is already installed."
fi
mkdir -p ~/.kube
sudo cp /etc/rancher/k3s/k3s.yaml ~/.kube/config
sudo chown $(id -u):$(id -g) ~/.kube/config
chmod 600 ~/.kube/config

# 2. Setup Linux Bridge
if ! ip link show br0 &> /dev/null; then
  echo "Creating Linux bridge br0..."
  sudo ip link add br0 type bridge
  sudo ip addr add 192.168.100.1/24 dev br0
  sudo ip link set br0 up
  sudo sysctl -w net.ipv4.ip_forward=1
  # MASQUERADE might fail if eth0 is not the main interface, but we try standard
  MAIN_IF=$(ip route | grep default | sed -e "s/^.*dev.//" -e "s/.proto.*//")
  sudo iptables -t nat -A POSTROUTING -o "$MAIN_IF" -j MASQUERADE || true
  sudo iptables -A FORWARD -i br0 -j ACCEPT || true
  sudo iptables -A FORWARD -o br0 -m state --state RELATED,ESTABLISHED -j ACCEPT || true
  # Ensure QEMU bridge helper can use br0
  sudo mkdir -p /etc/qemu
  echo "allow br0" | sudo tee -a /etc/qemu/bridge.conf
else
  echo "Bridge br0 already exists."
fi

# 3. Download iPXE binaries
mkdir -p /tmp/tftpboot
if [ ! -f /tmp/tftpboot/ipxe-x86_64.efi ]; then
  echo "Downloading iPXE binaries..."
  curl -L -o /tmp/tftpboot/ipxe-x86_64.efi "https://github.com/ipxe/ipxe/releases/download/rel-1.21.1/ipxe-x86_64-efi"
fi

# 4. Start dnsmasq
if ! pgrep -af "dnsmasq.*br0" &> /dev/null; then
  echo "Starting dnsmasq on br0..."
  sudo dnsmasq \
    --interface=br0 \
    --bind-interfaces \
    --dhcp-range=192.168.100.10,192.168.100.50,120s \
    --dhcp-option=option:router,192.168.100.1 \
    --dhcp-option=option:dns-server,8.8.8.8 \
    --dhcp-range=192.168.100.10,192.168.100.50,proxy \
    --enable-tftp \
    --tftp-root=/tmp/tftpboot \
    --dhcp-boot=tag:!ipxe,ipxe-x86_64.efi \
    --dhcp-boot=tag:ipxe,http://192.168.100.1:8082/ipxe \
    --dhcp-leasefile=/tmp/dnsmasq.leases \
    --log-dhcp \
    --keep-in-foreground &
  sleep 2
else
  echo "dnsmasq is already running on br0."
fi
'''

[tasks.test-provisioning-e2e]
description = "CAPI Test Framework と k3s を使用して Provisioning E2E テストを実行する"
run = '''
mise run setup-test-provisioning-k3s
mise run build-installer-e2e
IMG="${IMG:-ghcr.io/walnuts1018/cluster-api-provider-tart:latest}"
CONTAINER_TOOL="${CONTAINER_TOOL:-docker}"
"$CONTAINER_TOOL" build -t "$IMG" .
# Load image into k3s to ensure it's available locally
if command -v k3s &> /dev/null; then
  "$CONTAINER_TOOL" save "$IMG" | sudo k3s ctr images import -
fi

ARTIFACTS="${ARTIFACTS:-${PWD}/_artifacts}"
mkdir -p "$ARTIFACTS"
export KUBECONFIG=~/.kube/config
# Clusterctl does not expand ${PWD} in config file, so we do it here
CONFIG_TEMP=$(mktemp)
trap 'rm -f "$CONFIG_TEMP"' EXIT
export PWD="${PWD}"
envsubst < "${PWD}/test/e2e/config/tart.yaml" > "$CONFIG_TEMP"
go test -tags=e2e ./test/e2e/provisioning/... -v -ginkgo.v -e2e.artifacts-folder="$ARTIFACTS" -e2e.config="$CONFIG_TEMP" -e2e.use-existing-cluster=true
'''

[tasks.install]
description = "現在の kubeconfig のクラスタへ CRD を install する"
run = '''
mise run manifests
out="$(kustomize build config/crd 2>/dev/null || true)"
if [ -n "$out" ]; then
  printf '%s\n' "$out" | kubectl apply -f -
else
  echo "No CRDs to install; skipping."
fi
'''

[tasks.uninstall]
description = "現在の kubeconfig のクラスタから CRD を uninstall する"
run = '''
IGNORE_NOT_FOUND="${IGNORE_NOT_FOUND:-false}"
mise run manifests
out="$(kustomize build config/crd 2>/dev/null || true)"
if [ -n "$out" ]; then
  printf '%s\n' "$out" | kubectl delete --ignore-not-found="$IGNORE_NOT_FOUND" -f -
else
  echo "No CRDs to delete; skipping."
fi
'''

[tasks.deploy]
description = "現在の kubeconfig のクラスタへ controller を deploy する"
run = '''
IMG="${IMG:-controller:latest}"
mise run manifests
(cd config/manager && kustomize edit set image controller="$IMG")
kustomize build config/default | kubectl apply -f -
'''

[tasks.undeploy]
description = "現在の kubeconfig のクラスタから controller を undeploy する"
run = '''
IGNORE_NOT_FOUND="${IGNORE_NOT_FOUND:-false}"
kustomize build config/default | kubectl delete --ignore-not-found="$IGNORE_NOT_FOUND" -f -
'''

[tasks.kustomize]
description = "kustomize が mise 経由で利用できることを確認する"
run = "kustomize version"

[tasks.controller-gen]
description = "controller-gen が mise 経由で利用できることを確認する"
run = "controller-gen --version"

[tasks.wire-bin]
description = "wire が mise 経由で利用できることを確認する"
run = "wire help"

[tasks.setup-envtest]
description = "envtest バイナリを用意する"
run = '''
LOCALBIN="${LOCALBIN:-$PWD/bin}"
ENVTEST_K8S_VERSION="${ENVTEST_K8S_VERSION:-$(go list -m k8s.io/api | awk '{print $2}' | sed -E 's/^v?[0-9]+\.([0-9]+).*/1.\1/')}"
mkdir -p "$LOCALBIN"
echo "Setting up envtest binaries for Kubernetes version $ENVTEST_K8S_VERSION..."
setup-envtest use "$ENVTEST_K8S_VERSION" --bin-dir "$LOCALBIN" -p path
'''

[tasks.envtest]
description = "setup-envtest が mise 経由で利用できることを確認する"
run = "setup-envtest --help"

[tasks.golangci-lint]
description = "golangci-lint が mise 経由で利用できることを確認する"
run = '''
mise run ensure-custom-golangci-lint
if [ -x bin/golangci-lint ]; then
  bin/golangci-lint version
else
  golangci-lint version
fi
'''

[tasks.sync-helm-chart]
description = "config/crd/bases を charts/cluster-api-provider-tart/crd/bases に同期する"
run = "bash hack/sync-helm-chart.sh"

[tasks.sync-all]
description = "generate と sync-helm-chart を実行する"
run = '''
mise run generate
mise run sync-helm-chart
'''
