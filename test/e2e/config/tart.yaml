managementClusterName: "tart-e2e"

images:
  - name: ghcr.io/walnuts1018/cluster-api-provider-tart:latest
    loadBehavior: mustLoad

providers:
  - name: cluster-api
    type: CoreProvider
    versions:
      - name: v1.13.1
        value: "https://github.com/kubernetes-sigs/cluster-api/releases/download/v1.13.1/core-components.yaml"
        type: "url"
        contract: v1beta2
  - name: kubeadm
    type: BootstrapProvider
    versions:
      - name: v1.13.1
        value: "https://github.com/kubernetes-sigs/cluster-api/releases/download/v1.13.1/bootstrap-components.yaml"
        type: "url"
        contract: v1beta2
  - name: kubeadm
    type: ControlPlaneProvider
    versions:
      - name: v1.13.1
        value: "https://github.com/kubernetes-sigs/cluster-api/releases/download/v1.13.1/control-plane-components.yaml"
        type: "url"
        contract: v1beta2
  - name: tart
    type: InfrastructureProvider
    versions:
      - name: v0.0.0
        value: "${PWD}/dist/install-e2e.yaml"
        type: "url"
        contract: v1beta2
        files:
          - sourcePath: "${PWD}/config/templates/cluster-template-kubeadm.yaml"
            targetName: "cluster-template.yaml"

variables:
  KUBERNETES_VERSION: "v1.35.4"
  CNI: "https://raw.githubusercontent.com/projectcalico/calico/v3.32.0/manifests/calico.yaml"
  UBUNTU_KERNEL_URL: "https://cloud-images.ubuntu.com/releases/24.04/release/unpacked/ubuntu-24.04-server-cloudimg-amd64-vmlinuz-generic"
  UBUNTU_INITRD_URL: "https://cloud-images.ubuntu.com/releases/24.04/release/unpacked/ubuntu-24.04-server-cloudimg-amd64-initrd-generic"
  DEBIAN_INSTALLER_KERNEL_URL: "https://deb.debian.org/debian/dists/trixie/main/installer-amd64/current/images/netboot/debian-installer/amd64/linux"
  DEBIAN_INSTALLER_INITRD_URL: "https://deb.debian.org/debian/dists/trixie/main/installer-amd64/current/images/netboot/debian-installer/amd64/initrd.gz"
  TALOS_KERNEL_URL: "https://factory.talos.dev/image/installer/latest/kernel-amd64"
  TALOS_INITRD_URL: "https://factory.talos.dev/image/installer/latest/initramfs-amd64.xz"
  CONTROL_PLANE_ENDPOINT_HOST: "192.168.100.100"
  CLUSTER_NAME: "tart-test"
  CONTROL_PLANE_MACHINE_COUNT: "1"
  WORKER_MACHINE_COUNT: "1"

intervals:
  default/wait-controllers: ["3m", "10s"]
  default/wait-cluster: ["5m", "10s"]
  default/wait-control-plane: ["10m", "10s"]
  default/wait-worker-nodes: ["10m", "10s"]
  default/wait-delete-cluster: ["5m", "10s"]
  default/wait-machine-upgrade: ["15m", "10s"]
  default/wait-machine-status: ["5m", "10s"]
